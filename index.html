<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Anomaly Early Warning System</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #header {
            padding: 20px;
            text-align: center;
            background-color: #1e1e1e;
            border-bottom: 2px solid #ff4444;
        }

        /* The Map Canvas */
        #map {
            height: 80vh;
            width: 100%;
        }

        /* Custom styling for the popup box */
        .leaflet-popup-content-wrapper {
            background-color: #2b2b2b;
            color: #ffffff;
            border: 1px solid #ff4444;
        }

        .leaflet-popup-tip {
            background-color: #2b2b2b;
        }
    </style>
</head>

<body>

    <div id="header">
        <h2>🔥 Spatiotemporal Climate Risk Dashboard</h2>
        <p>Live Anomaly Detection System | Target Region: Kolkata</p>
        <p id="live-time" style="font-weight: bold; color: #ffeb3b;"></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // Start a ticking clock for accurate IST time in the header
        function updateClock() {
            var liveTimeStr = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'medium' });
            document.getElementById('live-time').innerText = `Current Time (IST): ${liveTimeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 1. Initialize the map and set it to Kolkata's coordinates
        var map = L.map('map').setView([22.5726, 88.3639], 10);

        // 2. Add a Dark Mode map layer (Judges love dark mode)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 19
        }).addTo(map);

        // 3. Read the CSV file generated by your Python Brain
        Papa.parse("smart_kolkata_anomalies.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                var data = results.data;

                // Get the most recent anomaly (the last row in the CSV)
                var latestAnomaly = data[data.length - 1];

                if (latestAnomaly && latestAnomaly.Date) {
                    // 4. Draw a massive glowing red circle over Kolkata
                    var dangerZone = L.circle([22.5726, 88.3639], {
                        color: 'red',
                        fillColor: '#f03',
                        fillOpacity: 0.5,
                        radius: 15000 // 15km radius
                    }).addTo(map);

                    // Format current date and time in IST for the popup
                    var now = new Date();
                    var istOptions = {
                        timeZone: 'Asia/Kolkata',
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                    };
                    var istDateTimeStr = now.toLocaleString('en-IN', istOptions);

                    // 5. Add a popup with the exact AI data (displaying real-time IST)
                    var popupText = `
                        <h3 style="color: #ff4444; margin: 0 0 10px 0;">⚠️ HEATWAVE ALERT</h3>
                        <b>Detected On:</b> ${istDateTimeStr} (IST)<br>
                        <b>Spike Temp:</b> ${parseFloat(latestAnomaly.Max_Temp_C).toFixed(1)}°C<br>
                        <b>Normal Baseline:</b> ${parseFloat(latestAnomaly['21_Day_Avg']).toFixed(1)}°C<br>
                        <b>Danger Limit Exceeded:</b> ${parseFloat(latestAnomaly.Upper_Danger_Limit).toFixed(1)}°C
                    `;

                    dangerZone.bindPopup(popupText).openPopup();
                } else {
                    console.log("No anomalies found or error reading CSV.");
                }
            }
        });
    </script>
</body>

</html>
